<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MessageBox</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <h2>Message Box</h2>

        <p>200 characters max</p>

        <textarea id="message" placeholder="Type your message here..." maxlength="200"></textarea>

        <p id="counter">0 / 200 characters</p>

        <p id="warning"></p>

    </div>

    <script src="script.js"></script>


</body>

</html>

<style>

    body{
    font-family: Arial;
    background-color: #f4f4f4;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.container{
    background: white;
    padding: 25px;
    width: 350px;
    border-radius: 8px;
    
}

textarea{
    width: 100%;
    height: 120px;
    padding: 10px;
    margin-top: 10px;
    resize: none;
}

#counter{
    margin-top: 10px;
    font-size: 14px;
}

#warning{
    color: red;
    font-size: 14px;
}

</style>
